- defaults:
    link:
      relink: true

- clean: ['~']

- link:
    ~/.gitconfig: git/gitconfig
    ~/.zshrc: zsh/zshrc
    ~/.zshenv: zsh/zshenv
    ~/.config/starship.toml: starship/starship.toml

- create:
    - ~/.config/
    - ~/.vim/

- shell:
  - command: ./setup-homebrew.sh
    stdout: true
    stderr: true
